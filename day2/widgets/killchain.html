<!-- Kill-chain stage imagery, petrol-duotoned, shown image-forward with a scrim.
     recon: Sherlock Holmes (Sidney Paget, public domain) — investigation;
     weaponise: retro "SPACE GUN" toy ray gun (CC0) — a free-licensed stand-in
     for the ray-gun idea; deliver: stacked pizza boxes (CC0); foothold: a
     leather boot / "foot in the door" (CC0); move: a trail of footprints (CC0). -->
<style>
  body { padding: 6px; background: transparent; }
  .kc { display: flex; align-items: stretch; gap: 9px; }
  .stage { position: relative; flex: 1; margin: 0; min-height: 306px; border-radius: 15px;
    overflow: hidden; box-shadow: 0 5px 16px rgba(0,86,124,.18);
    opacity: 0; transform: translateY(13px);
    transition: transform .16s ease, box-shadow .16s ease; }
  .stage img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
    transition: transform .45s ease; }
  .stage::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 5px;
    z-index: 3; background: #1F8F89; }
  .stage.next::before { background: #B7C6C8; }
  .stage:hover { transform: translateY(-5px); box-shadow: 0 14px 30px rgba(0,86,124,.26); }
  .stage:hover img { transform: scale(1.06); }
  .scrim { position: absolute; left: 0; right: 0; bottom: 0; z-index: 2; margin: 0;
    padding: 30px 14px 14px;
    background: linear-gradient(to top, rgba(2,30,44,.95) 0%, rgba(2,30,44,.78) 48%, rgba(2,30,44,0) 100%); }
  .n { font-size: 10px; font-weight: 800; letter-spacing: .17em; text-transform: uppercase; color: #7FE3DC; }
  .stage.next .n { color: #B7C6C8; }
  .t { font-size: 19px; font-weight: 800; color: #fff; margin-top: 3px; line-height: 1.08; }
  .cap { font-size: 11.5px; color: #CFE6E7; margin-top: 6px; line-height: 1.34; }
  .stage.next { filter: saturate(.7); }
  .arrow { align-self: center; flex: 0 0 auto; color: #A7BABF; font-weight: 800; font-size: 22px; opacity: 0; }
  @keyframes rise { to { opacity: 1; transform: translateY(0); } }
  @keyframes riseFaint { to { opacity: .62; transform: translateY(0); } }
  @keyframes fadein { to { opacity: 1; } }
  @media (prefers-reduced-motion: reduce) {
    .stage, .arrow { animation: none !important; opacity: 1 !important; transform: none !important; }
    .stage.next { opacity: .62 !important; }
  }
</style>
