<style>
  body { padding: 6px; background: transparent; }
  .kc { display: flex; align-items: stretch; gap: 0; }
  .kc .stage { flex: 1; display: flex; flex-direction: column; align-items: center;
    text-align: center; background: #fff; border: 1px solid #E0E7E8; border-radius: 13px;
    padding: 11px 9px 13px; opacity: 0; transform: translateY(12px);
    transition: transform .15s ease, box-shadow .15s ease; }
  .kc .stage.today { border-top: 3px solid #1F8F89; }
  .kc .stage.next { border: 1px dashed #CDD8DA; }
  .kc .stage:hover { transform: translateY(-4px); box-shadow: 0 10px 22px rgba(0,86,124,.16); }
  .thumb { width: 100%; max-width: 138px; aspect-ratio: 1 / 1; border-radius: 11px;
    overflow: hidden; border: 1px solid #D3E1E1; box-shadow: 0 3px 8px rgba(0,86,124,.16); }
  .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .n { font-size: 10px; font-weight: 800; letter-spacing: .14em; text-transform: uppercase;
    color: #8AA1A8; margin-top: 10px; }
  .t { font-weight: 800; color: #00567C; font-size: 15.5px; margin-top: 2px; }
  .today .t { color: #1F8F89; }
  .cap { font-size: 11px; color: #5C7880; margin-top: 5px; line-height: 1.32; }
  .arrow { align-self: center; color: #9BB0B6; font-weight: 800; font-size: 20px;
    padding: 0 4px; flex: 0 0 auto; opacity: 0; margin-bottom: 26px; }
  @keyframes rise { to { opacity: 1; transform: translateY(0); } }
  @keyframes riseFaint { to { opacity: .6; transform: translateY(0); } }
  @keyframes fadein { to { opacity: 1; } }
  @media (prefers-reduced-motion: reduce) {
    .kc .stage, .arrow { animation: none !important; opacity: 1 !important; transform: none !important; }
    .kc .stage.next { opacity: .6 !important; }
  }
</style>
