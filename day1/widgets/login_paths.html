<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="_shared.css">
<style>
  body { padding:6px 8px; }
  .w { padding:12px 14px; }
  .lead { font-size:13.5px; color:#42606A; margin:0 0 14px; line-height:1.4; }
  .lead b { color:#00567C; }

  .lane { position:relative; border:1px solid #E0E7E8; border-radius:12px; background:#fff; padding:12px 14px; margin-bottom:12px; }
  .lane .hd { display:flex; align-items:center; gap:9px; font-weight:800; font-size:14px; margin-bottom:10px; }
  .lane.brk .hd { color:#B85C00; } .lane.log .hd { color:#D64545; }
  .lane .hd .tag { font-size:11px; font-weight:700; padding:2px 9px; border-radius:999px; margin-left:auto; }
  .lane.brk .hd .tag { background:#FBEEDD; color:#B85C00; } .lane.log .hd .tag { background:#FBE9E9; color:#D64545; }

  .track { position:relative; height:56px; border-radius:10px; background:#F6F8F8; border:1px dashed #CDD8DA; overflow:hidden; }
  .goal { position:absolute; right:8px; top:50%; transform:translateY(-50%); font-size:28px; }
  .wall { position:absolute; top:0; bottom:0; width:38px; display:flex; align-items:center; justify-content:center;
    font-size:22px; background:linear-gradient(90deg,rgba(184,92,0,0) ,rgba(184,92,0,.14)); transition:left .3s; }
  .mover { position:absolute; top:50%; left:6px; transform:translate(0,-50%); font-size:26px;
    transition:left 1.1s cubic-bezier(.5,0,.5,1); }
  .lane.log .track { background:#FEF6F6; border-color:#F0D4D4; }
  .boom { position:absolute; top:50%; transform:translateY(-50%); font-size:20px; opacity:0; transition:opacity .2s; }

  .res { font-size:12.5px; font-weight:700; margin-top:8px; min-height:17px; line-height:1.35; }
  .lane.brk .res { color:#B85C00; } .lane.log .res { color:#c0392b; }
  .res .sub { color:#7C929A; font-weight:600; }

  .ctl { display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:12px; }
  .toggle { display:flex; align-items:center; gap:9px; border:1.5px solid #CDD8DA; background:#fff; border-radius:10px;
    padding:9px 12px; cursor:pointer; font-weight:700; font-size:13.5px; color:#42606A; transition:all .15s; }
  .toggle .st { font-size:11px; font-weight:800; padding:2px 9px; border-radius:999px; background:#EEF2F2; color:#8AA1A8; }
  .toggle.on { border-color:#1F8F89; background:#F1F8F7; color:#12333D; } .toggle.on .st { background:#1F8F89; color:#fff; }

  .verdict { border-left:3px solid #00567C; background:#EDF3F6; border-radius:0 8px 8px 0;
    padding:10px 13px; font-size:13.5px; line-height:1.45; color:#274b54; }
  .verdict b { color:#00567C; }
</style>
</head><body>
<div class="w">
  <p class="lead">Two ways into a system. One is a movie. The other is what actually happens.
    <b>Send both attackers</b> — and try hardening the code.</p>

  <div class="lane brk">
    <div class="hd">🧱 Break in — find &amp; exploit a bug in the code <span class="tag">the movie</span></div>
    <div class="track">
      <div class="wall" id="wall">🧱</div>
      <span class="goal">🖥️</span>
      <span class="boom" id="boom">🚨</span>
      <span class="mover" id="mBrk">🥷</span>
    </div>
    <div class="res" id="rBrk"></div>
  </div>

  <div class="lane log">
    <div class="hd">🚪 Log in — use a password that's phished, leaked, or guessed <span class="tag">the reality</span></div>
    <div class="track">
      <span class="goal">🖥️</span>
      <span class="mover" id="mLog">🥷</span>
    </div>
    <div class="res" id="rLog"></div>
  </div>

  <div class="ctl">
    <button class="primary" id="go">▶ Send both attackers</button>
    <button class="toggle" id="tHard"><span>🛡️ Patch every bug (harden the code)</span><span class="st">OFF</span></button>
  </div>

  <div class="verdict" id="verdict"></div>
</div>

<script>
(function () {
  var hard = false, t = [];
  var mBrk = document.getElementById("mBrk"), mLog = document.getElementById("mLog"),
      wall = document.getElementById("wall"), boom = document.getElementById("boom"),
      rBrk = document.getElementById("rBrk"), rLog = document.getElementById("rLog"),
      verdict = document.getElementById("verdict"), go = document.getElementById("go"), tHard = document.getElementById("tHard");

  function clear() { t.forEach(clearTimeout); t = []; }
  function reset() {
    mBrk.style.left = "6px"; mLog.style.left = "6px"; boom.style.opacity = "0";
    rBrk.innerHTML = ""; rLog.innerHTML = "";
    wall.style.left = (hard ? 22 : 42) + "%";
  }

  function run() {
    clear(); reset(); go.disabled = true;
    var wallPct = hard ? 22 : 42;
    t.push(setTimeout(function () {
      // break-in attacker crashes into the wall
      mBrk.style.left = "calc(" + wallPct + "% - 34px)";
      boom.style.left = wallPct + "%";
    }, 60));
    t.push(setTimeout(function () {
      boom.style.opacity = "1";
      rBrk.innerHTML = hard
        ? "✗ Blocked — the bug is patched. <span class='sub'>Exploits are rare, expensive, and die the moment they're fixed.</span>"
        : "✗ Usually blocked — needs a rare <b>0-day</b>. <span class='sub'>Costly, easily patched, and it trips alarms.</span>";
    }, 1000));
    // login attacker strolls straight in
    t.push(setTimeout(function () { mLog.style.left = "calc(100% - 42px)"; }, 60));
    t.push(setTimeout(function () {
      rLog.innerHTML = "✓ <b>Inside.</b> A valid login — <span class='sub'>no bug, no alarm. Nothing was “hacked”; the attacker simply logged in.</span>";
    }, 1250));
    t.push(setTimeout(function () {
      verdict.innerHTML = hard
        ? "You hardened every line of code — and the front door is still a <b>password</b>. That's why attackers don't break in; <b>they log in</b>. Next: how one password falls, and what stops it."
        : "Pour effort into the walls if you like — most attackers skip them and use the door: a stolen or guessed <b>password</b>. <b>They log in, they don't hack.</b>";
      go.disabled = false;
    }, 1500));
  }

  go.addEventListener("click", run);
  tHard.addEventListener("click", function () { hard = !hard; tHard.classList.toggle("on", hard);
    tHard.querySelector(".st").textContent = hard ? "ON" : "OFF"; run(); });

  reset();
  verdict.innerHTML = "Press <b>▶ Send both attackers</b> and watch which one gets in.";
  if (/go=1/.test(location.search)) { if (/hard=1/.test(location.search)) { hard = true; tHard.classList.add("on"); tHard.querySelector(".st").textContent = "ON"; } run(); }
})();
</script>
</body></html>
